<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NLC Performance Timer</title>
    <!-- React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#ff5500',
                        'brand-orange-glow': 'rgba(255, 85, 0, 0.4)',
                        'tactical-black': '#050505',
                        'tactical-gray': '#111111',
                    },
                    boxShadow: {
                        'neon-orange': '0 0 10px rgba(255, 85, 0, 0.6), 0 0 20px rgba(255, 85, 0, 0.4)',
                        'neon-white': '0 0 10px rgba(255, 255, 255, 0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Oswald:wght@300;400;600;700&display=swap');
        
        body {
            background-color: #050505;
            /* Tactical grid background */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #e5e5e5;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Animations */
        @keyframes pulse-orange {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 85, 0, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(255, 85, 0, 0); }
        }
        .animate-pulse-orange { animation: pulse-orange 2s infinite; }

        @keyframes scanline { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(100vh); } 
        }
        .scanline-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.25) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 50;
        }
        .scanline-bar {
            width: 100%;
            height: 50px;
            z-index: 51;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(0,0,0,0) 100%);
            position: absolute;
            top: 0;
            animation: scanline 8s linear infinite;
            pointer-events: none;
        }

        /* Tactical Button Styling */
        .btn-tactical {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-tactical:active { transform: translateY(2px); }
        .btn-tactical.selected {
            border-color: #ffffff;
            background: #ffffff;
            color: #000000;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        
        .text-glow-orange { text-shadow: 0 0 10px rgba(255,85,0,0.8); }
        .text-glow-white { text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        
        /* Custom scrollbar for clean look if needed */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>
    <div class="scanline-overlay"></div>
    <div id="root" class="h-screen w-full relative z-10 flex flex-col"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- AUDIO ENGINES ---
        // 1. Synth Beeps for precision timing
        const SoundFX = {
            ctx: null,
            init: () => {
                if (!SoundFX.ctx) {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (AudioContext) SoundFX.ctx = new AudioContext();
                }
                if (SoundFX.ctx && SoundFX.ctx.state === 'suspended') SoundFX.ctx.resume();
                return SoundFX.ctx;
            },
            play: (type) => {
                const ctx = SoundFX.init();
                if (!ctx) return;
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                const now = ctx.currentTime;

                switch (type) {
                    case 'WORK': 
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600, now);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                        gain.gain.setValueAtTime(0.5, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        osc.start(now); osc.stop(now + 0.5);
                        break;
                    case 'REST': 
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                        gain.gain.setValueAtTime(0.6, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now); osc.stop(now + 0.3);
                        break;
                    case 'PIP': 
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(800, now);
                        gain.gain.setValueAtTime(0.1, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                        osc.start(now); osc.stop(now + 0.05);
                        break;
                    case 'SERIES': 
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(440, now);
                        osc.frequency.setValueAtTime(660, now + 0.1);
                        osc.frequency.setValueAtTime(880, now + 0.2);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                        osc.start(now); osc.stop(now + 0.6);
                        break;
                }
            }
        };

        // 2. Verbal Speech Synthesis
        const SpeechEngine = {
            prime: () => {
                if ('speechSynthesis' in window) {
                    // Speak a silent utterance to unlock speech synthesis on user interaction
                    const u = new SpeechSynthesisUtterance('');
                    u.volume = 0;
                    window.speechSynthesis.speak(u);
                }
            },
            speak: (text) => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); // Interrupt current speech
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 1.05; // Slightly faster for tactical feel
                    utterance.pitch = 0.9; // Slightly deeper
                    utterance.volume = 1;
                    window.speechSynthesis.speak(utterance);
                }
            }
        };

        // --- CUSTOM HOOKS ---
        const useWakeLock = () => {
            const [isLocked, setIsLocked] = useState(false);
            const wakeLockRef = useRef(null);

            const request = useCallback(async () => {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                        setIsLocked(true);
                        wakeLockRef.current.addEventListener('release', () => setIsLocked(false));
                    }
                } catch (err) {
                    console.error('Wake Lock error:', err);
                    setIsLocked(false);
                }
            }, []);

            const release = useCallback(async () => {
                if (wakeLockRef.current) {
                    await wakeLockRef.current.release();
                    wakeLockRef.current = null;
                    setIsLocked(false);
                }
            }, []);

            useEffect(() => {
                const handleVisibility = () => {
                    if (document.visibilityState === 'visible') request();
                };
                document.addEventListener('visibilitychange', handleVisibility);
                return () => {
                    release();
                    document.removeEventListener('visibilitychange', handleVisibility);
                };
            }, [request, release]);

            return { isLocked, request, release };
        };

        const CUES = [
            "Shake the muscles. Fast and Loose.",
            "Do not sit down. Walk around.",
            "Nasal breathing only.",
            "Visualise the next set.",
            "Loose grip, explosive hips.",
            "Shake it out. Stay standing."
        ];

        // --- FOOTER COMPONENT ---
        const Footer = () => (
            <div className="w-full text-center pb-6 pt-4 mt-auto">
                <span className="text-[10px] font-mono tracking-[0.4em] text-gray-600 uppercase">
                    Adapt // Recover // Master
                </span>
            </div>
        );

        // --- SYSTEM BADGE ---
        const SystemBadge = ({ text, active }) => (
            <div className="absolute top-4 right-4 flex items-center gap-2 z-50">
                <div className={`w-2 h-2 rounded-full ${active ? 'bg-brand-orange shadow-neon-orange animate-pulse' : 'bg-gray-700'}`}></div>
                <span className={`text-[9px] font-mono tracking-widest uppercase ${active ? 'text-brand-orange' : 'text-gray-600'}`}>{text}</span>
            </div>
        );

        // --- GATEWAY ---
        const Gateway = ({ onComplete }) => {
            const [soreness, setSoreness] = useState(null);
            const [tiredness, setTiredness] = useState(null);
            const [energy, setEnergy] = useState(null);

            const check = () => {
                let redFlags = 0;
                if (soreness === 3) redFlags++;
                if (tiredness === 3) redFlags++;
                if (energy === 1) redFlags++;
                onComplete(redFlags >= 2);
            };

            const getBtnColor = (isSelected, value, type) => {
                if (!isSelected) return 'bg-tactical-gray border-[#222] text-gray-500 hover:border-[#444]';
                
                const isBad = type === 'energy' ? value === 1 : value === 3;
                const isMed = value === 2;
                
                if (isBad) return 'bg-[#2a0e00] border-brand-orange text-brand-orange shadow-[0_0_15px_rgba(255,85,0,0.15)]';
                if (isMed) return 'bg-[#1a1a1a] border-gray-400 text-gray-200';
                return 'bg-white border-white text-black shadow-neon-white'; 
            };

            const Selector = ({ label, val, setVal, type }) => (
                <div className="mb-6">
                    <div className="flex justify-between items-center mb-2">
                        <span className="text-xs uppercase tracking-widest text-gray-400">{label}</span>
                    </div>
                    <div className="flex gap-2 h-14">
                        {[1, 2, 3].map(v => (
                            <button 
                                key={v}
                                onClick={() => setVal(v)}
                                className={`flex-1 border transition-all duration-200 font-mono text-sm tracking-wider ${getBtnColor(val === v, v, type)}`}
                            >
                                {type === 'energy' 
                                    ? (v === 1 ? 'LOW' : v === 2 ? 'MED' : 'HIGH')
                                    : (v === 1 ? 'LOW' : v === 2 ? 'MED' : 'HIGH')
                                }
                            </button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto w-full animate-fade-in z-20 relative">
                    <div className="flex-1 flex flex-col justify-center">
                        <div className="mb-10 text-center">
                            <h1 className="text-5xl font-black italic tracking-tighter leading-none text-white drop-shadow-lg">
                                NLC <span className="text-brand-orange text-glow-orange">PERFORMANCE</span>
                            </h1>
                            <h2 className="text-sm font-mono tracking-[0.4em] text-gray-500 uppercase mt-3">Tactical Timer</h2>
                            <div className="w-full h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent mt-8"></div>
                        </div>
                        <Selector label="Soreness" val={soreness} setVal={setSoreness} type="negative" />
                        <Selector label="Tiredness" val={tiredness} setVal={setTiredness} type="negative" />
                        <Selector label="Energy Levels" val={energy} setVal={setEnergy} type="energy" />
                    </div>
                    <button 
                        disabled={!soreness || !tiredness || !energy}
                        onClick={check}
                        className="w-full py-5 bg-white text-black font-bold text-lg uppercase tracking-widest disabled:opacity-10 hover:bg-brand-orange hover:text-white transition-all shadow-lg hover:shadow-neon-orange"
                    >
                        Initialize System
                    </button>
                    <Footer />
                </div>
            );
        };

        // --- SETUP ---
        const Setup = ({ forcedLow, onLaunch }) => {
            const [exercise, setExercise] = useState('A'); 
            const [protocol, setProtocol] = useState('5/4');
            const [badDay, setBadDay] = useState(false);
            const [rolled, setRolled] = useState(false);
            const [seriesCount, setSeriesCount] = useState(0);
            const [totalReps, setTotalReps] = useState(0);
            const [diceValue, setDiceValue] = useState(0);

            useEffect(() => {
                if (forcedLow) {
                    setSeriesCount(2);
                    setTotalReps(40);
                    setRolled(true);
                }
            }, [forcedLow]);

            const rollDie = () => {
                SoundFX.init(); // Initialize audio context on user interaction
                
                if (badDay) {
                    setSeriesCount(2);
                    setTotalReps(40);
                    setDiceValue(0);
                } else {
                    const roll = Math.floor(Math.random() * 6) + 1;
                    setDiceValue(roll);
                    
                    let s = 2;
                    if (roll === 1) s = 2;
                    else if (roll <= 3) s = 3;
                    else if (roll <= 5) s = 4;
                    else s = 5;
                    
                    setSeriesCount(s);
                    setTotalReps(s * 20); 
                }
                setRolled(true);
                SoundFX.play('SERIES');
            };

            const executeMission = () => {
                SpeechEngine.prime(); // Unlock speech synthesis
                onLaunch({ exercise, protocol, seriesCount, totalReps });
            };

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto w-full justify-between animate-fade-in z-20 relative">
                    <div>
                        <h2 className="text-sm font-mono text-gray-400 mb-8 uppercase tracking-widest border-b border-gray-800 pb-3">Mission Config</h2>
                        
                        <div className="mb-8">
                            <label className="text-xs font-mono text-brand-orange uppercase mb-3 block">Movement Pattern</label>
                            <div className="flex gap-3">
                                <button onClick={() => setExercise('A')} className={`btn-tactical flex-1 py-4 text-sm ${exercise === 'A' ? 'selected' : ''}`}>Swings + Pushups</button>
                                <button onClick={() => setExercise('B')} className={`btn-tactical flex-1 py-4 text-sm ${exercise === 'B' ? 'selected' : ''}`}>Snatch (L & R)</button>
                            </div>
                        </div>
                        
                        <div className="mb-8">
                            <label className="text-xs font-mono text-brand-orange uppercase mb-3 block">Protocol</label>
                            <div className="flex gap-3">
                                <button onClick={() => setProtocol('5/4')} className={`btn-tactical flex-1 py-4 ${protocol === '5/4' ? 'selected' : ''}`}>
                                    <span className="text-lg">5/4</span><br/><span className={`text-[10px] uppercase font-mono tracking-widest ${protocol === '5/4' ? 'text-gray-800' : 'text-gray-500'}`}>Power</span>
                                </button>
                                <button onClick={() => setProtocol('10/2')} className={`btn-tactical flex-1 py-4 ${protocol === '10/2' ? 'selected' : ''}`}>
                                    <span className="text-lg">10/2</span><br/><span className={`text-[10px] uppercase font-mono tracking-widest ${protocol === '10/2' ? 'text-gray-800' : 'text-gray-500'}`}>Mass</span>
                                </button>
                            </div>
                        </div>
                        
                        {!forcedLow && !rolled && (
                            <div className="flex items-center justify-between bg-tactical-gray p-4 border border-gray-800 cursor-pointer hover:border-gray-600 transition-colors" onClick={() => setBadDay(!badDay)}>
                                <span className="text-xs font-mono text-white uppercase tracking-widest">Manual Regression?</span>
                                <div className={`w-12 h-6 rounded-full relative transition-colors ${badDay ? 'bg-brand-orange shadow-neon-orange' : 'bg-gray-800'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${badDay ? 'left-7' : 'left-1'}`}></div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <div className="text-center mt-auto mb-2">
                        {!rolled ? (
                            <button onClick={rollDie} className="w-full py-6 bg-white text-black font-bold text-xl uppercase tracking-widest hover:bg-brand-orange hover:text-white transition-all hover:shadow-neon-orange shadow-lg">
                                Roll The Die
                            </button>
                        ) : (
                            <div className="animate-fade-in bg-tactical-gray border border-gray-800 p-6 shadow-2xl relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-brand-orange"></div>
                                <div className="text-gray-500 text-xs font-mono uppercase tracking-widest mb-2">Target Acquired</div>
                                {diceValue > 0 && <div className="text-brand-orange text-xs font-mono mb-4 tracking-widest drop-shadow">DICE ROLLED: {diceValue}</div>}
                                
                                <div className="text-4xl md:text-5xl font-mono font-bold text-white mb-6 leading-tight text-glow-white">
                                    {exercise === 'A' ? (
                                        <>
                                            {seriesCount * 20} <span className="text-xl text-gray-500 tracking-widest">SWINGS</span><br/>
                                            <span className="text-brand-orange text-2xl mx-2">/</span><br/>
                                            {seriesCount * 20} <span className="text-xl text-gray-500 tracking-widest">PUSHUPS</span>
                                        </>
                                    ) : (
                                        <>
                                            {seriesCount * 20} <span className="text-xl text-gray-500 tracking-widest">SNATCHES</span>
                                        </>
                                    )}
                                </div>

                                <div className="text-white text-sm font-bold uppercase tracking-widest mb-6 py-2 border-y border-gray-800">{seriesCount} Series Total</div>
                                
                                {forcedLow && <div className="text-brand-orange text-xs font-mono border border-brand-orange inline-block px-3 py-2 mb-6 bg-orange-900/20 shadow-neon-orange">⚠ READINESS COMPROMISED</div>}
                                
                                <button 
                                    onClick={executeMission}
                                    className="w-full py-5 bg-brand-orange text-white font-bold text-lg uppercase tracking-widest hover:bg-white hover:text-black transition-all shadow-neon-orange"
                                >
                                    Execute Order
                                </button>
                            </div>
                        )}
                    </div>
                    <Footer />
                </div>
            );
        };

        // --- ACTIVE SESSION ---
        const ActiveSession = ({ config, onFinish, onCancel }) => {
            const [time, setTime] = useState(0); 
            const [totalTime, setTotalTime] = useState(0); 
            const [currentSeries, setCurrentSeries] = useState(1);
            const [currentBlock, setCurrentBlock] = useState(config.exercise === 'A' ? 'SWINGS' : 'SNATCH');
            const [isActive, setIsActive] = useState(false);
            const [status, setStatus] = useState('GET READY'); 
            const [cue, setCue] = useState("");
            const [showAbortModal, setShowAbortModal] = useState(false);
            const [spokenState, setSpokenState] = useState(null);
            
            const intervalRef = useRef(null);
            const { isLocked, request: requestLock } = useWakeLock();

            const SERIES_DURATION = config.exercise === 'A' ? 180 : 240; 
            const workTriggers = config.protocol === '5/4' ? [0, 30, 60, 90] : [0, 60];
            const deepRestStart = config.protocol === '5/4' ? 120 : 90; 

            // Handle Wake Lock activation
            useEffect(() => { 
                setIsActive(true); 
                requestLock();
                SpeechEngine.speak("Standby. Mission begins.");
            }, [requestLock]);

            // Verbal Cues Engine
            useEffect(() => {
                if (status === spokenState) return; // Prevent repeating
                
                if (status === 'WORK') {
                    SpeechEngine.speak("Work!");
                } else if (status === 'RECOVER') {
                    SpeechEngine.speak("Recover.");
                } else if (status === 'DEEP REST') {
                    SpeechEngine.speak("Deep rest.");
                    // Delay the specific cue slightly
                    if (cue) {
                        setTimeout(() => {
                            if(isActive) SpeechEngine.speak(cue);
                        }, 2500);
                    }
                }
                setSpokenState(status);
            }, [status, cue, spokenState, isActive]);

            // Timer Engine
            useEffect(() => {
                if (isActive && !showAbortModal) {
                    intervalRef.current = setInterval(() => {
                        setTime(t => t + 1);
                        setTotalTime(tt => tt + 1);
                    }, 1000);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [isActive, showAbortModal]);

            // State Logic Engine
            useEffect(() => {
                if (showAbortModal) return;

                // BLOCK/SERIES END LOGIC
                if (time >= SERIES_DURATION) {
                    if (config.exercise === 'A') {
                        if (currentBlock === 'SWINGS') {
                            setCurrentBlock('PUSHUPS');
                            setTime(0);
                            setStatus('GET READY');
                            SoundFX.play('SERIES');
                        } else {
                            if (currentSeries < config.seriesCount) {
                                setCurrentSeries(c => c + 1);
                                setCurrentBlock('SWINGS');
                                setTime(0);
                                setStatus('GET READY');
                                SoundFX.play('SERIES');
                            } else {
                                setIsActive(false);
                                SpeechEngine.speak("Mission Complete. Well done.");
                                onFinish(totalTime);
                            }
                        }
                    } else {
                        // Snatches
                        if (currentSeries < config.seriesCount) {
                            setCurrentSeries(c => c + 1);
                            setTime(0);
                            setStatus('GET READY');
                            SoundFX.play('SERIES');
                        } else {
                            setIsActive(false);
                            SpeechEngine.speak("Mission Complete. Well done.");
                            onFinish(totalTime);
                        }
                    }
                    return;
                }

                // TRIGGERS
                if (workTriggers.includes(time)) {
                    setStatus('WORK');
                    SoundFX.play('WORK'); 
                    setCue("");
                } else if (time >= deepRestStart) {
                    if (status !== 'DEEP REST') {
                        setStatus('DEEP REST');
                        setCue(CUES[Math.floor(Math.random() * CUES.length)]);
                    }
                } else {
                    const timeSinceTrigger = Math.min(...workTriggers.map(t => time - t).filter(d => d >= 0));
                    if (timeSinceTrigger === 20 && status === 'WORK') {
                        setStatus('RECOVER');
                        SoundFX.play('REST'); 
                    }
                }

                // 3-2-1 PIPS
                const nextTrigger = workTriggers.find(t => t > time) || SERIES_DURATION;
                if (nextTrigger - time <= 3 && nextTrigger - time > 0) {
                    SoundFX.play('PIP'); 
                }

            }, [time, config, currentSeries, currentBlock, showAbortModal]);

            const getInstruction = () => {
                if (status === 'WORK') return config.protocol === '5/4' ? `EXPLODE: 5` : `POWER: 10`;
                if (status === 'RECOVER') return "SHAKE IT OUT";
                if (status === 'DEEP REST') return "DEEP RECOVERY";
                return "GET READY";
            }

            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
            
            let statusColor = "text-gray-500";
            if (status === 'WORK') statusColor = "text-white text-glow-white";
            if (status === 'RECOVER') statusColor = "text-gray-400";
            if (status === 'DEEP REST') statusColor = "text-brand-orange text-glow-orange";

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto relative w-full z-20">
                    <div className="scanline-bar"></div>
                    <SystemBadge text="Screen Lock Active" active={isLocked} />
                    
                    {/* Header */}
                    <div className="flex justify-between items-end border-b border-gray-800 pb-4 mb-8 mt-6">
                        <div>
                            <div className="text-xs font-mono text-gray-500 uppercase tracking-widest">Series</div>
                            <div className="text-3xl font-mono text-white drop-shadow">{currentSeries} <span className="text-gray-700 text-xl">/ {config.seriesCount}</span></div>
                        </div>
                        <div className="text-right">
                            <div className="text-xs font-mono text-gray-500 uppercase tracking-widest">Total Time</div>
                            <div className="text-xl font-mono text-gray-300">{formatTime(totalTime)}</div>
                        </div>
                    </div>

                    {/* HUD */}
                    <div className="flex-1 flex flex-col items-center justify-center">
                        <div className="text-sm font-mono text-brand-orange mb-3 uppercase font-bold tracking-[0.2em] bg-orange-900/20 px-4 py-1 border border-brand-orange/30">
                            Current: {currentBlock}
                        </div>
                        
                        <div className={`text-5xl sm:text-6xl font-black italic uppercase text-center leading-none mb-6 ${statusColor} transition-all duration-300`}>
                            {getInstruction()}
                        </div>
                        
                        <div className="w-full bg-tactical-gray border border-gray-800 h-2 mb-8 relative overflow-hidden rounded-full">
                            <div className="absolute top-0 left-0 h-full bg-white transition-all duration-1000 linear shadow-neon-white" style={{width: `${(time / SERIES_DURATION) * 100}%`}}></div>
                        </div>
                        
                        <div className="text-8xl sm:text-9xl font-mono font-bold text-white tracking-tighter drop-shadow-lg">
                            {formatTime(SERIES_DURATION - time)}
                        </div>
                        
                        <div className="h-24 mt-8 w-full">
                            {status === 'DEEP REST' && (
                                <div className="p-4 border-l-4 border-brand-orange bg-[#0a0a0a] w-full animate-fade-in shadow-lg">
                                    <div className="text-[10px] font-mono text-brand-orange uppercase mb-1 font-bold tracking-widest">Audio Coach</div>
                                    <div className="text-xl font-medium italic text-gray-200">"{cue}"</div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ABORT BUTTON */}
                    <div className="mt-auto pt-4 flex flex-col items-center">
                        <button onClick={() => setShowAbortModal(true)} className="text-[10px] font-mono font-bold text-gray-600 uppercase tracking-widest hover:text-brand-orange border border-transparent hover:border-brand-orange/50 px-4 py-2 transition-all mb-2">
                            [ Abort Mission ]
                        </button>
                        <Footer />
                    </div>

                    {/* ABORT MODAL */}
                    {showAbortModal && (
                        <div className="fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="w-full max-w-sm bg-[#050505] border-2 border-brand-orange p-8 text-center animate-pulse-orange shadow-2xl">
                                <h2 className="text-4xl font-black text-brand-orange uppercase mb-3 text-glow-orange">WARNING</h2>
                                <p className="text-gray-300 mb-8 font-mono uppercase text-sm tracking-wide leading-relaxed">Abort current mission? <br/>All session data will be lost.</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowAbortModal(false)} className="flex-1 py-4 bg-tactical-gray border border-gray-600 text-white font-bold uppercase tracking-wider hover:bg-gray-800">Resume</button>
                                    <button onClick={() => { SpeechEngine.speak("Mission Aborted."); onCancel(); }} className="flex-1 py-4 bg-brand-orange text-black font-black uppercase tracking-wider shadow-neon-orange hover:bg-white transition-colors">ABORT</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- SUMMARY ---
        const Summary = ({ totalTime, config, onReset }) => {
            const [feedback, setFeedback] = useState(null);
            const formatTime = (s) => `${Math.floor(s / 60)}m ${s % 60}s`;

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto w-full justify-center text-center animate-fade-in z-20 relative">
                    <div className="scanline-overlay opacity-50"></div>
                    
                    <h1 className="text-4xl md:text-5xl font-black text-white italic mb-3 drop-shadow-lg text-glow-white">MISSION COMPLETE</h1>
                    <div className="w-16 h-1 bg-brand-orange mx-auto mb-10 shadow-neon-orange"></div>
                    
                    <div className="grid grid-cols-2 gap-4 mb-10">
                        <div className="bg-[#0a0a0a] p-5 border border-gray-800 flex flex-col justify-center shadow-lg">
                            <div className="text-xs font-mono text-brand-orange uppercase tracking-widest mb-2">Duration</div>
                            <div className="text-3xl font-mono text-white">{formatTime(totalTime)}</div>
                        </div>
                        <div className="bg-[#0a0a0a] p-5 border border-gray-800 flex flex-col justify-center shadow-lg">
                            <div className="text-xs font-mono text-brand-orange uppercase tracking-widest mb-2">Total Volume</div>
                            <div className="text-xl font-mono text-white leading-snug">
                                {config.exercise === 'A' ? (
                                    <>
                                        {config.seriesCount * 20} Swings<br/>
                                        <span className="text-gray-600">/</span><br/>
                                        {config.seriesCount * 20} Pushups
                                    </>
                                ) : (
                                    <>{config.seriesCount * 20} Snatches</>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    <div className="mb-12 relative z-10">
                        <div className="text-xs font-mono text-gray-400 uppercase tracking-widest mb-4">Post-Action Report</div>
                        <div className="flex gap-3">
                            {['EASY', 'STRONG', 'SMOKED'].map((rating) => (
                                <button 
                                    key={rating} 
                                    onClick={() => setFeedback(rating)} 
                                    className={`flex-1 py-5 border font-mono text-sm tracking-wider transition-all duration-300 ${
                                        feedback === rating 
                                            ? (rating === 'SMOKED' ? 'bg-[#3d1000] border-brand-orange text-brand-orange shadow-neon-orange scale-105' : 'bg-white text-black border-white shadow-neon-white scale-105') 
                                            : 'bg-tactical-gray border-[#222] text-gray-500 hover:border-gray-600'
                                    }`}
                                >
                                    {rating}
                                </button>
                            ))}
                        </div>
                        {feedback === 'SMOKED' && (
                            <div className="mt-6 text-brand-orange text-xs font-mono border border-brand-orange p-4 bg-[#1a0800] shadow-neon-orange animate-fade-in">
                                ⚠ WARNING: INTENSITY THRESHOLD EXCEEDED.<br/>REDUCE LOAD NEXT SESSION.
                            </div>
                        )}
                    </div>
                    
                    <div className="mt-auto flex flex-col items-center relative z-10">
                        <button onClick={onReset} className="text-gray-400 border border-gray-800 px-8 py-4 text-xs font-mono uppercase tracking-widest hover:text-white hover:border-white transition-all mb-4 bg-[#0a0a0a] hover:shadow-neon-white">
                            Restart System
                        </button>
                        <Footer />
                    </div>
                </div>
            );
        };

        // --- APP ROOT ---
        const App = () => {
            const [view, setView] = useState('GATEWAY'); 
            const [forcedLow, setForcedLow] = useState(false);
            const [config, setConfig] = useState({});
            const [sessionData, setSessionData] = useState({});

            const handleGatewayComplete = (isLow) => {
                setForcedLow(isLow);
                setView('SETUP');
            };

            const handleLaunch = (launchConfig) => {
                setConfig(launchConfig);
                setView('WORKOUT');
            };

            const handleFinish = (finalTime) => {
                setSessionData({ time: finalTime, config: config });
                setView('SUMMARY');
            };

            const handleCancel = () => {
                setForcedLow(false);
                setConfig({});
                setView('GATEWAY');
            };

            return (
                <div className="w-full h-full">
                    {view === 'GATEWAY' && <Gateway onComplete={handleGatewayComplete} />}
                    {view === 'SETUP' && <Setup forcedLow={forcedLow} onLaunch={handleLaunch} />}
                    {view === 'WORKOUT' && <ActiveSession config={config} onFinish={handleFinish} onCancel={handleCancel} />}
                    {view === 'SUMMARY' && <Summary totalTime={sessionData.time} config={sessionData.config} onReset={handleCancel} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
