<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NLC Performance Timer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-orange': '#ff6300',
                        'tactical-black': '#050505',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Oswald:wght@400;600;700&display=swap');
        
        body {
            background-color: #050505;
            color: #e5e5e5;
            font-family: 'Oswald', sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Animations */
        @keyframes pulse-orange {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 99, 0, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 99, 0, 0); }
        }
        .animate-pulse-orange { animation: pulse-orange 2s infinite; }

        .btn-tactical {
            background: #111;
            border: 1px solid #333;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.1s;
        }
        .btn-tactical:active { background: #222; transform: translateY(2px); }
        .btn-tactical.selected {
            border-color: #ffffff;
            background: #ffffff;
            color: #000000;
            font-weight: bold;
        }
        
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 10;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(255, 255, 255, 0.02) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 10s linear infinite;
            pointer-events: none;
        }
        @keyframes scanline { 0% { bottom: 100%; } 100% { bottom: -100%; } }
    </style>
</head>
<body>
    <div id="root" class="h-screen w-full relative"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- AUDIO ENGINE ---
        const SoundFX = {
            init: () => {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return null;
                return new AudioContext();
            },
            play: (type) => {
                const ctx = SoundFX.init();
                if (!ctx) return;
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                const now = ctx.currentTime;

                switch (type) {
                    case 'WORK': 
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(600, now);
                        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                        gain.gain.setValueAtTime(0.5, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                        osc.start(now);
                        osc.stop(now + 0.5);
                        break;
                    case 'REST': 
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                        gain.gain.setValueAtTime(0.6, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
                        osc.start(now);
                        osc.stop(now + 0.3);
                        break;
                    case 'PIP': 
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(800, now);
                        gain.gain.setValueAtTime(0.05, now);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                        osc.start(now);
                        osc.stop(now + 0.05);
                        break;
                    case 'SERIES': 
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(440, now);
                        osc.frequency.setValueAtTime(660, now + 0.1);
                        osc.frequency.setValueAtTime(880, now + 0.2);
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
                        osc.start(now);
                        osc.stop(now + 0.6);
                        break;
                }
            }
        };

        const CUES = [
            "Shake the muscles - Fast and Loose!",
            "Don't sit down. Walk around.",
            "Nasal breathing only.",
            "Visualise the next set.",
            "Loose grip, explosive hips.",
            "Shake it out. Stay standing."
        ];

        // --- FOOTER COMPONENT ---
        const Footer = () => (
            <div className="w-full text-center pb-4 pt-4 mt-auto">
                <span className="text-[11px] font-bold tracking-[0.3em] text-gray-500 uppercase">
                    Adapt. Recover. Master.
                </span>
            </div>
        );

        // --- GATEWAY ---
        const Gateway = ({ onComplete }) => {
            const [soreness, setSoreness] = useState(null);
            const [tiredness, setTiredness] = useState(null);
            const [energy, setEnergy] = useState(null);

            const check = () => {
                let redFlags = 0;
                if (soreness === 3) redFlags++;
                if (tiredness === 3) redFlags++;
                if (energy === 1) redFlags++;
                onComplete(redFlags >= 2);
            };

            const getBtnColor = (isSelected, value, type) => {
                if (!isSelected) return 'bg-[#111] border-gray-800 text-gray-600';
                
                const isBad = type === 'energy' ? value === 1 : value === 3;
                const isMed = value === 2;
                
                if (isBad) return 'bg-[#2a0e00] border-brand-orange text-brand-orange';
                if (isMed) return 'bg-[#1a1a1a] border-gray-400 text-gray-300';
                return 'bg-white border-white text-black'; 
            };

            const Selector = ({ label, val, setVal, type }) => (
                <div className="mb-6">
                    <div className="flex justify-between items-center mb-2">
                        <span className="text-xs uppercase tracking-widest text-gray-400">{label}</span>
                    </div>
                    <div className="flex gap-2 h-12">
                        {[1, 2, 3].map(v => (
                            <button 
                                key={v}
                                onClick={() => setVal(v)}
                                className={`flex-1 border transition-all duration-200 font-mono font-bold text-sm ${getBtnColor(val === v, v, type)}`}
                            >
                                {type === 'energy' 
                                    ? (v === 1 ? 'LOW' : v === 2 ? 'MED' : 'HIGH')
                                    : (v === 1 ? 'LOW' : v === 2 ? 'MED' : 'HIGH')
                                }
                            </button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto animate-fade-in">
                    <div className="flex-1 flex flex-col justify-center">
                        <div className="mb-10 text-center">
                            <h1 className="text-5xl font-black italic tracking-tighter leading-none text-white">
                                NLC <span className="text-brand-orange">PERFORMANCE</span>
                            </h1>
                            <h2 className="text-lg font-bold tracking-[0.4em] text-gray-500 uppercase mt-2">Timer</h2>
                            <div className="w-full h-px bg-gradient-to-r from-transparent via-gray-700 to-transparent mt-6"></div>
                        </div>
                        <Selector label="Soreness" val={soreness} setVal={setSoreness} type="negative" />
                        <Selector label="Tiredness" val={tiredness} setVal={setTiredness} type="negative" />
                        <Selector label="Energy Levels" val={energy} setVal={setEnergy} type="energy" />
                    </div>
                    <button 
                        disabled={!soreness || !tiredness || !energy}
                        onClick={check}
                        className="w-full py-6 bg-white text-black font-bold text-lg uppercase tracking-widest disabled:opacity-20 hover:bg-brand-orange hover:text-white transition-all"
                    >
                        Initialize System
                    </button>
                    <Footer />
                </div>
            );
        };

        // --- SETUP ---
        const Setup = ({ forcedLow, onLaunch }) => {
            const [exercise, setExercise] = useState('A'); 
            const [protocol, setProtocol] = useState('5/4');
            const [badDay, setBadDay] = useState(false);
            const [rolled, setRolled] = useState(false);
            const [seriesCount, setSeriesCount] = useState(0);
            const [totalReps, setTotalReps] = useState(0);
            const [diceValue, setDiceValue] = useState(0);

            useEffect(() => {
                if (forcedLow) {
                    setSeriesCount(2);
                    setTotalReps(40);
                    setRolled(true);
                }
            }, [forcedLow]);

            const rollDie = () => {
                if (badDay) {
                    setSeriesCount(2);
                    setTotalReps(40);
                    setDiceValue(0);
                } else {
                    const roll = Math.floor(Math.random() * 6) + 1;
                    setDiceValue(roll);
                    
                    let s = 2;
                    if (roll === 1) s = 2;
                    else if (roll <= 3) s = 3;
                    else if (roll <= 5) s = 4;
                    else s = 5;
                    
                    setSeriesCount(s);
                    setTotalReps(s * 20); 
                }
                setRolled(true);
                SoundFX.play('SERIES');
            };

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto justify-between animate-fade-in">
                    <div>
                        <h2 className="text-xs font-mono text-gray-400 mb-6 uppercase border-b border-gray-800 pb-2">Mission Configuration</h2>
                        <div className="mb-6">
                            <label className="text-xs text-gray-500 uppercase mb-2 block">Movement Pattern</label>
                            <div className="flex gap-2">
                                <button onClick={() => setExercise('A')} className={`btn-tactical flex-1 py-4 text-sm ${exercise === 'A' ? 'selected' : ''}`}>Swings + Pushups</button>
                                <button onClick={() => setExercise('B')} className={`btn-tactical flex-1 py-4 text-sm ${exercise === 'B' ? 'selected' : ''}`}>Snatch (L & R)</button>
                            </div>
                        </div>
                        <div className="mb-6">
                            <label className="text-xs text-gray-500 uppercase mb-2 block">Protocol</label>
                            <div className="flex gap-2">
                                <button onClick={() => setProtocol('5/4')} className={`btn-tactical flex-1 py-3 ${protocol === '5/4' ? 'selected' : ''}`}>5/4 <span className={`text-[10px] block ${protocol === '5/4' ? 'text-gray-600' : 'text-gray-500'}`}>Power</span></button>
                                <button onClick={() => setProtocol('10/2')} className={`btn-tactical flex-1 py-3 ${protocol === '10/2' ? 'selected' : ''}`}>10/2 <span className={`text-[10px] block ${protocol === '10/2' ? 'text-gray-600' : 'text-gray-500'}`}>Mass</span></button>
                            </div>
                        </div>
                        {!forcedLow && !rolled && (
                            <div className="flex items-center justify-between bg-[#111] p-4 border border-gray-800 cursor-pointer" onClick={() => setBadDay(!badDay)}>
                                <span className="text-sm text-white uppercase font-bold tracking-wider">Manual Regression?</span>
                                <div className={`w-12 h-6 rounded-full relative transition-colors ${badDay ? 'bg-brand-orange' : 'bg-gray-700'}`}>
                                    <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-all ${badDay ? 'left-7' : 'left-1'}`}></div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    <div className="text-center mt-auto mb-4">
                        {!rolled ? (
                            <button onClick={rollDie} className="w-full py-6 bg-white text-black font-bold text-xl uppercase tracking-widest hover:bg-brand-orange hover:text-white transition-colors relative overflow-hidden group">
                                <span className="relative z-10">Roll The Die</span>
                                <div className="absolute inset-0 bg-brand-orange transform -translate-x-full group-hover:translate-x-0 transition-transform duration-200"></div>
                            </button>
                        ) : (
                            <div className="animate-pulse">
                                <div className="text-gray-500 text-xs uppercase tracking-widest mb-1">Target Acquired</div>
                                {diceValue > 0 && <div className="text-brand-orange text-xs font-mono font-bold mb-4 tracking-widest">DICE ROLLED: {diceValue}</div>}
                                
                                <div className="text-4xl md:text-5xl font-mono font-bold text-white mb-4 leading-tight">
                                    {exercise === 'A' ? (
                                        <>
                                            {seriesCount * 20} <span className="text-xl text-gray-500">SWINGS</span><br/>
                                            <span className="text-2xl text-brand-orange">/</span><br/>
                                            {seriesCount * 20} <span className="text-xl text-gray-500">PUSHUPS</span>
                                        </>
                                    ) : (
                                        <>
                                            {seriesCount * 20} <span className="text-xl text-gray-500">SNATCHES</span>
                                        </>
                                    )}
                                </div>

                                <div className="text-white text-sm font-bold uppercase tracking-widest mb-8">{seriesCount} Series Total</div>
                                
                                {forcedLow && <div className="text-brand-orange text-xs font-mono border border-brand-orange inline-block px-3 py-1 mb-4 bg-orange-900/20">⚠ READINESS COMPROMISED</div>}
                                
                                <button 
                                    onClick={() => onLaunch({ exercise, protocol, seriesCount, totalReps })}
                                    className="w-full py-5 bg-brand-orange text-white font-bold uppercase tracking-widest hover:bg-white hover:text-black transition-colors"
                                >
                                    Execute
                                </button>
                            </div>
                        )}
                    </div>
                    <Footer />
                </div>
            );
        };

        // --- ACTIVE SESSION ---
        const ActiveSession = ({ config, onFinish, onCancel }) => {
            const [time, setTime] = useState(0); 
            const [totalTime, setTotalTime] = useState(0); 
            const [currentSeries, setCurrentSeries] = useState(1);
            const [currentBlock, setCurrentBlock] = useState(config.exercise === 'A' ? 'SWINGS' : 'SNATCH');
            const [isActive, setIsActive] = useState(false);
            const [status, setStatus] = useState('GET READY'); 
            const [cue, setCue] = useState("");
            const [showAbortModal, setShowAbortModal] = useState(false);
            
            const intervalRef = useRef(null);
            const wakeLockRef = useRef(null);

            const SERIES_DURATION = config.exercise === 'A' ? 180 : 240; 
            const workTriggers = config.protocol === '5/4' ? [0, 30, 60, 90] : [0, 60];
            const deepRestStart = config.protocol === '5/4' ? 120 : 90; 

            // Screen Wake Lock API to prevent the phone from sleeping
            const requestWakeLock = async () => {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLockRef.current = await navigator.wakeLock.request('screen');
                    }
                } catch (err) {
                    console.error('Wake Lock error:', err.message);
                }
            };

            const releaseWakeLock = async () => {
                if (wakeLockRef.current !== null) {
                    await wakeLockRef.current.release();
                    wakeLockRef.current = null;
                }
            };

            useEffect(() => { 
                setIsActive(true); 
                requestWakeLock();

                // Re-acquire lock if user switches apps and comes back
                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    releaseWakeLock();
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                };
            }, []);

            useEffect(() => {
                if (isActive && !showAbortModal) {
                    intervalRef.current = setInterval(() => {
                        setTime(t => t + 1);
                        setTotalTime(tt => tt + 1);
                    }, 1000);
                } else {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [isActive, showAbortModal]);

            useEffect(() => {
                if (showAbortModal) return;

                // BLOCK/SERIES END LOGIC
                if (time >= SERIES_DURATION) {
                    if (config.exercise === 'A') {
                        if (currentBlock === 'SWINGS') {
                            setCurrentBlock('PUSHUPS');
                            setTime(0);
                            SoundFX.play('SERIES');
                        } else {
                            if (currentSeries < config.seriesCount) {
                                setCurrentSeries(c => c + 1);
                                setCurrentBlock('SWINGS');
                                setTime(0);
                                SoundFX.play('SERIES');
                            } else {
                                setIsActive(false);
                                onFinish(totalTime);
                            }
                        }
                    } else {
                        // Snatches
                        if (currentSeries < config.seriesCount) {
                            setCurrentSeries(c => c + 1);
                            setTime(0);
                            SoundFX.play('SERIES');
                        } else {
                            setIsActive(false);
                            onFinish(totalTime);
                        }
                    }
                    return;
                }

                // TRIGGERS
                if (workTriggers.includes(time)) {
                    setStatus('WORK');
                    SoundFX.play('WORK'); 
                    setCue("");
                } else if (time >= deepRestStart) {
                    if (status !== 'DEEP REST') {
                        setStatus('DEEP REST');
                        setCue(CUES[Math.floor(Math.random() * CUES.length)]);
                    }
                } else {
                    const timeSinceTrigger = Math.min(...workTriggers.map(t => time - t).filter(d => d >= 0));
                    if (timeSinceTrigger === 20 && status === 'WORK') {
                        setStatus('RECOVER');
                        SoundFX.play('REST'); 
                    }
                }

                // 3-2-1 PIPS
                const nextTrigger = workTriggers.find(t => t > time) || SERIES_DURATION;
                if (nextTrigger - time <= 3 && nextTrigger - time > 0) {
                    SoundFX.play('PIP'); 
                }

            }, [time, config, currentSeries, currentBlock, showAbortModal]);

            const getInstruction = () => {
                if (status === 'WORK') return config.protocol === '5/4' ? `EXPLODE: 5 REPS` : `POWER: 10 REPS`;
                if (status === 'RECOVER') return "SHAKE IT OUT";
                if (status === 'DEEP REST') return "DEEP RECOVERY";
                return "GET READY";
            }

            const getUpNext = () => `Current: ${currentBlock}`;

            const formatTime = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
            
            let statusColor = "text-gray-500";
            if (status === 'WORK') statusColor = "text-white drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]";
            if (status === 'RECOVER') statusColor = "text-gray-500";
            if (status === 'DEEP REST') statusColor = "text-brand-orange drop-shadow-[0_0_10px_rgba(255,99,0,0.5)]";

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto relative">
                    <div className="scanline"></div>
                    
                    {/* Header */}
                    <div className="flex justify-between items-end border-b border-gray-800 pb-4 mb-8">
                        <div>
                            <div className="text-xs text-gray-500 uppercase tracking-widest">Series</div>
                            <div className="text-2xl font-mono text-white">{currentSeries} <span className="text-gray-600 text-lg">/ {config.seriesCount}</span></div>
                        </div>
                        <div className="text-right">
                            <div className="text-xs text-gray-500 uppercase tracking-widest">Total Time</div>
                            <div className="text-xl font-mono text-gray-400">{formatTime(totalTime)}</div>
                        </div>
                    </div>

                    {/* HUD */}
                    <div className="flex-1 flex flex-col items-center justify-center">
                        <div className="text-sm font-mono text-brand-orange mb-2 uppercase font-bold tracking-widest">{getUpNext()}</div>
                        <div className={`text-6xl font-black italic uppercase text-center leading-none mb-4 ${statusColor} transition-all duration-300`}>
                            {getInstruction()}
                        </div>
                        <div className="w-full bg-gray-900 h-1 mt-4 mb-8">
                            <div className="h-full bg-white transition-all duration-1000 linear" style={{width: `${(time / SERIES_DURATION) * 100}%`}}></div>
                        </div>
                        <div className="text-8xl font-mono font-bold text-white tracking-tighter">
                            {formatTime(SERIES_DURATION - time)}
                        </div>
                        
                        {status === 'DEEP REST' && (
                            <div className="mt-12 p-4 border-l-2 border-brand-orange bg-[#111] w-full animate-fade-in">
                                <div className="text-[10px] text-brand-orange uppercase mb-1 font-bold tracking-widest">Coach says:</div>
                                <div className="text-lg font-medium italic text-gray-300">"{cue}"</div>
                            </div>
                        )}
                    </div>

                    {/* ABORT BUTTON */}
                    <div className="mt-auto pt-4 flex flex-col items-center">
                        <button onClick={() => setShowAbortModal(true)} className="text-xs font-bold text-gray-600 uppercase tracking-widest hover:text-brand-orange border border-transparent hover:border-brand-orange px-4 py-2 transition-all mb-4">
                            [ CANCEL OPERATION ]
                        </button>
                        <Footer />
                    </div>

                    {/* ABORT MODAL */}
                    {showAbortModal && (
                        <div className="absolute inset-0 bg-black/90 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
                            <div className="w-full bg-[#111] border-2 border-brand-orange p-6 text-center animate-pulse-orange">
                                <h2 className="text-3xl font-black text-brand-orange uppercase mb-2">WARNING</h2>
                                <p className="text-gray-300 mb-8 uppercase text-sm tracking-wide">Abort current mission? <br/>Session data will be lost.</p>
                                <div className="flex gap-4">
                                    <button onClick={() => setShowAbortModal(false)} className="flex-1 py-4 bg-gray-800 text-white font-bold uppercase tracking-wider">Resume</button>
                                    <button onClick={onCancel} className="flex-1 py-4 bg-brand-orange text-black font-black uppercase tracking-wider">ABORT</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- SUMMARY ---
        const Summary = ({ totalTime, config, onReset }) => {
            const [feedback, setFeedback] = useState(null);
            const formatTime = (s) => `${Math.floor(s / 60)}m ${s % 60}s`;

            return (
                <div className="h-full flex flex-col p-6 max-w-lg mx-auto justify-center text-center animate-fade-in">
                    <h1 className="text-4xl font-black text-white italic mb-2">MISSION COMPLETE</h1>
                    <div className="w-16 h-1 bg-brand-orange mx-auto mb-12"></div>
                    <div className="grid grid-cols-2 gap-4 mb-8">
                        <div className="bg-[#111] p-4 border border-gray-800 flex flex-col justify-center">
                            <div className="text-xs text-gray-500 uppercase tracking-widest mb-1">Duration</div>
                            <div className="text-2xl font-mono text-white">{formatTime(totalTime)}</div>
                        </div>
                        <div className="bg-[#111] p-4 border border-gray-800 flex flex-col justify-center">
                            <div className="text-xs text-gray-500 uppercase tracking-widest mb-1">Volume</div>
                            <div className="text-lg md:text-xl font-mono text-white leading-tight">
                                {config.exercise === 'A' ? (
                                    <>
                                        {config.seriesCount * 20} Swings<br/>
                                        <span className="text-brand-orange text-sm">/</span><br/>
                                        {config.seriesCount * 20} Pushups
                                    </>
                                ) : (
                                    <>{config.seriesCount * 20} Snatches</>
                                )}
                            </div>
                        </div>
                    </div>
                    <div className="mb-12">
                        <div className="text-xs text-gray-500 uppercase tracking-widest mb-4">Post-Action Report</div>
                        <div className="flex gap-2">
                            {['EASY', 'STRONG', 'SMOKED'].map((rating) => (
                                <button 
                                    key={rating} 
                                    onClick={() => setFeedback(rating)} 
                                    className={`flex-1 py-4 border text-sm font-bold tracking-wider transition-colors ${
                                        feedback === rating 
                                            ? (rating === 'SMOKED' ? 'bg-[#3d1000] border-brand-orange text-brand-orange' : 'bg-white text-black border-white') 
                                            : 'bg-[#111] border-gray-800 text-gray-500'
                                    }`}
                                >
                                    {rating}
                                </button>
                            ))}
                        </div>
                        {feedback === 'SMOKED' && (
                            <div className="mt-4 text-brand-orange text-sm font-mono border border-brand-orange p-3 bg-[#1a0800]">
                                ⚠ WARNING: INTENSITY TOO HIGH. REDUCE POWER NEXT SESSION.
                            </div>
                        )}
                    </div>
                    
                    <div className="mt-auto flex flex-col items-center">
                        <button onClick={onReset} className="text-gray-400 border border-gray-700 px-6 py-3 text-sm uppercase tracking-widest font-bold hover:text-white hover:border-white transition-all mb-6">
                            Reset System
                        </button>
                        <Footer />
                    </div>
                </div>
            );
        };

        // --- APP ROOT ---
        const App = () => {
            const [view, setView] = useState('GATEWAY'); 
            const [forcedLow, setForcedLow] = useState(false);
            const [config, setConfig] = useState({});
            const [sessionData, setSessionData] = useState({});

            const handleGatewayComplete = (isLow) => {
                setForcedLow(isLow);
                setView('SETUP');
            };

            const handleLaunch = (launchConfig) => {
                setConfig(launchConfig);
                setView('WORKOUT');
            };

            const handleFinish = (finalTime) => {
                setSessionData({ time: finalTime, config: config });
                setView('SUMMARY');
            };

            const handleCancel = () => {
                setForcedLow(false);
                setConfig({});
                setView('GATEWAY');
            };

            return (
                <>
                    {view === 'GATEWAY' && <Gateway onComplete={handleGatewayComplete} />}
                    {view === 'SETUP' && <Setup forcedLow={forcedLow} onLaunch={handleLaunch} />}
                    {view === 'WORKOUT' && <ActiveSession config={config} onFinish={handleFinish} onCancel={handleCancel} />}
                    {view === 'SUMMARY' && <Summary totalTime={sessionData.time} config={sessionData.config} onReset={handleCancel} />}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
